<html>
<head>
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
	<script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.1/p5.js"></script>
	<script src="p5/c2.js"></script>
	<script		  src="https://code.jquery.com/jquery-3.6.0.min.js"
	integrity="sha256-/xUj+3OJU5yExlq6GSYGSHk7tPXikynS7ogEvDej/m4="
	crossorigin="anonymous"></script>
	<script src="jquery.onepage-scroll.min.js"></script>
	<link rel="stylesheet" href="onepage-scroll.css"/>
	<script type="application/javascript" src="p5/myWebsite.js"></script>

	<style>
		@font-face {
			font-family: building;
			src: url("p5/Building_Typeface.ttf");
		}
		body {
			background-color: black;
		}
		canvas {
			display: block;
			margin: auto;
			position: center;
			padding-top: 20px;
		}
		p{
			font-family: building;
		}

		.page1Words{
			color:white;
			font-size:80px;
		}
		.btn{
			font-family: sans-serif;
			font-weight: bold;
			font-size: 20px;
			color: azure;
			background-color: grey;
			padding: 5px;
			width:180px;
			border: 2px solid darkgrey;
			box-shadow: rgb(0, 0, 0) 0px 0px 0px 0px;
			border-radius: 50px;
			transition : 1000ms;
			transform: translateY(0);
			text-align: center;
		}

		.btn:hover{
			transition : 1000ms;
			width: 220px;
			background-color: azure;
			color: grey;
			border: solid 2px lightgrey;
		}

		.center {
			display: flex;
			justify-content: center;
		}

		.trueCenter{
			display: block;
			position: absolute;
			text-align: center;
			position: center;
			width:99%;
			padding-top: 100px;
		}
		.page2{
			background-color: white;
			margin-top:0px;
			padding-top: 0px;
		}
		.projects{
			font-family: building;
			font-size:40px;
			color:black;
			text-shadow: 2px grey;
			display: flex;
			justify-content: center;
			margin-top: -50px
		}

		.vids{
			transition:1000ms;
			position: relative;
			width:150px;
			margin-top: -80px;
			padding: 35px;
			display: block;
			justify-content: center;
		}
		.vids video {
			transition:1000ms;
			margin: 0px;
			width:150px;
		}
		.vids p{
			transition:1000ms;
			margin-top: 10px;
			width:auto;
			text-align:center;
			padding-bottom:15px;
		}

		.vids:hover{
			transition:1000ms;
			margin-bottom: -20px
		}
		.vids:hover video{
			transition:1000ms;
			width: 180px;
			box-shadow: 10px grey;
			margin-left: -10px;
			margin-right: -10px;
			margin-bottom:-10px;
			box-shadow: 0px 10px 5px 0px #888888;
		}
		.vids:hover p{
			transition:1000ms;
			margin-top:10px;
		}

		.page3{
			background-color: white;
			margin-top:0px;
			padding-top: 0px;
		}
		.page4{
			background-color:grey;
		}
	</style>

</head>

<body>
	<div class="main">
		<section>
			<div class= "animate__animated  animate__fadeInDown animate__delay-4s">
				<div class= center>
					<button href="index.html"class="btn"> Main page</button>
					<button href="projects.html"class="btn">Projects</button>
					<button class="btn">Experiences</button>
					<button class="btn">Contact</button>
				</div>
			</div>
			<div class=page1Words>
				<div class ="trueCenter">
					<div class ="animate__animated animate__fadeOut animate__delay-2s">
						<h1 class= "animate__animated  animate__fadeIn"> Welcome </h1>
					</div>
				</div>

				<div class ="trueCenter">
					<div class ="animate__animated animate__fadeOut animate__delay-4s">
						<h1 class= "animate__animated  animate__fadeIn animate__delay-2s"> to </h1>
					</div>
				</div>
			</div>

			<div class ="center">
				<div id="myWebsite"></div>
			</div>
		</section>
		<section class="page2">
			<div class ="projects" >
				<h1> Projects </h1>
			</div>
			<div class="center">
				<div class ="vids">
					<video onmouseover="this.play()"this.currentTime=0 loop=true onmouseout="this.pause()">
						<source src="webm/10step.webm" type="video/webm"></source>	
					</video>
					<p> 10 Step </p>
				</div>
				<div class ="vids">
					<video class="attrac" onmouseover="this.play()"this.currentTime=0 loop=true onmouseout="this.pause()">
						<source src="webm/attractorrepulsor.webm" type="video/webm"></source>
					</video>
					<p> Attractor </p> 
				</div>
				<div class ="vids">
					<video class="beesncubes" onmouseover="this.play()"this.currentTime=0 loop=true onmouseout="this.pause()">
						<source src="webm/beesncubes.webm" type="video/webm"></source>
					</video>
					<p> Bees n Cubes </p>
				</div>
				<div class ="vids">
					<video class="blob" onmouseover="this.play()"this.currentTime=0 loop=true onmouseout="this.pause()">
						<source src="webm/blob.webm" type="video/webm"></source>
					</video>
					<p> Blob </p>
				</div>
				<div class ="vids">
					<video class="linkedarm" onmouseover="this.play()"this.currentTime=0 loop=true onmouseout="this.pause()">
						<source src="webm/linkedarm.webm" type="video/webm"></source>
					</video>
					<p> Linked Arm </p>
				</div>
			</div>

			<div class="center">
				<div class ="vids">
					<video class="pendulum" onmouseover="this.play()"this.currentTime=0 loop=true onmouseout="this.pause()">
						<source src="webm/pendulum.webm" type="video/webm"></source>
					</video>
					<p> Pendulum </p>
				</div>
				<div class ="vids">
					<video class="fourier" onmouseover="this.play()"this.currentTime=0 loop=true onmouseout="this.pause()">
						<source src="webm/fourier.webm" type="video/webm"></source>
					</video>
					<p> Fourier </p>
				</div>
				<div class ="vids">
					<video class="perlinmap" onmouseover="this.play()"this.currentTime=0 loop=true onmouseout="this.pause()">
						<source src="webm/perlinmap.webm" type="video/webm"></source>
					</video>
					<p> Perlin Map </p>
				</div>
				<div class ="vids">
					<video class="pigeo" onmouseover="this.play()"this.currentTime=0 loop=true onmouseout="this.pause()">
			<source src="webm/pigeo.webm" type="video/webm"></source>
		</video>
					<p> Pi Geometry </p>
				</div>
				<div class ="vids">
					<video class="pirandom" onmouseover="this.play()"this.currentTime=0 loop=true onmouseout="this.pause()">
			<source src="webm/pirandom.webm" type="video/webm"></source>
		</video>
					<p> Pi Random </p>
				</div>
			</div>

			<div class="center">
				<div class ="vids">
					<video class="rings" onmouseover="this.play()"this.currentTime=0 loop=true onmouseout="this.pause()">
			<source src="webm/rings.webm" type="video/webm"></source>
		</video>
					<p> Rings </p>
				</div>
				<div class ="vids">
					<video class="picollision" onmouseover="this.play()"this.currentTime=0 loop=true onmouseout="this.pause()">
			<source src="webm/picollision.webm" type="video/webm"></source>
		</video>
					<p> Pi Collision </p>
				</div>
				<div class ="vids">
					<video class="randomwalk" onmouseover="this.play()"this.currentTime=0 loop=true onmouseout="this.pause()">
			<source src="webm/randomwalk.webm" type="video/webm"></source>
		</video>
					<p> 3D Random Walk </p>
				</div>
				<div class ="vids">
					<video class="pigeo" onmouseover="this.play()"this.currentTime=0 loop=true onmouseout="this.pause()">
			<source src="webm/pigeo.webm" type="video/webm"></source>
		</video>
					<p> Pi Geometry </p>
				</div>
				<div class ="vids">
				<video class="raycast" onmouseover="this.play()"this.currentTime=0 loop=true onmouseout="this.pause()">
			<source src="webm/raycast.webm" type="video/webm"></source>
		</video>
					<p> Raycast </p>
				</div>
			</div>
		</section>
		<section class="page3">
			<div class ="projects" >
				<h1> Projects </h1>
			</div>
		</section>
		<section class="page4">
		</section>
	</div>
</body>
<script type="text/javascript">
	$(".main").onepage_scroll({
   sectionContainer: "section",     // sectionContainer accepts any kind of selector in case you don't want to use section
   easing: "ease",                  // Easing options accepts the CSS3 easing animation such "ease", "linear", "ease-in",
                                    // "ease-out", "ease-in-out", or even cubic bezier value such as "cubic-bezier(0.175, 0.885, 0.420, 1.310)"
   animationTime: 1000,             // AnimationTime let you define how long each section takes to animate
   pagination: true,                // You can either show or hide the pagination. Toggle true for show, false for hide.
   updateURL: false,                // Toggle this true if you want the URL to be updated automatically when the user scroll to each page.
   beforeMove: function(index) {},  // This option accepts a callback function. The function will be called before the page moves.
   afterMove: function(index) {},   // This option accepts a callback function. The function will be called after the page moves.
   loop: false,                     // You can have the page loop back to the top/bottom when the user navigates at up/down on the first/last page.
   keyboard: true,                  // You can activate the keyboard controls
   responsiveFallback: false,        // You can fallback to normal page scroll by defining the width of the browser in which
                                    // you want the responsive fallback to be triggered. For example, set this to 600 and whenever
                                    // the browser's width is less than 600, the fallback will kick in.
   direction: "vertical"            // You can now define the direction of the One Page Scroll animation. Options available are "vertical" and "horizontal". The default value is "vertical".  
});
</script>
</html>
